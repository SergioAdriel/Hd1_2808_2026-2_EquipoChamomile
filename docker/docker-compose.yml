version: '3.9'

services:
  web:
    build:
      context: ..
      dockerfile: Docker/Dockerfile
    ports:
      - "8080:80"
    volumes:
      - ../Proyecto:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: proyecto
    ports:
      - "3307:3306"
    volumes:
      - ../Proyecto/mysql-init:/docker-entrypoint-initdb.d